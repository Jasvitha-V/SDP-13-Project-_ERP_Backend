# Server
server.port=${PORT:8080}


# Database
spring.datasource.url=jdbc:mysql://localhost:3306/eduerp_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=EduERPSecretKey2025ThisMustBeAtLeast256BitsLongForHS256AlgorithmSecurity
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:5173

# Logging
logging.level.com.eduerp=DEBUG
